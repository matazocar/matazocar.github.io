<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM Tracker — D&D 5e</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --parchment:#f5ead8;--parchment-dark:#e8d5b0;--parchment-deep:#d4b87a;
  --ink:#2a1a0a;--ink-mid:#5c3d1e;--ink-light:#8b6239;
  --blood:#8b1a1a;--blood-light:#c0392b;
  --gold:#c9a227;--gold-light:#f0c040;
  --shadow:#1a0f05;
  --hero-blue:#1a3a5c;--hero-blue-light:#2e5f8a;
  --enemy-red:#5c1a1a;--enemy-red-light:#8b2a2a;
  --hp-green:#2d5a27;
  --surface:#fdf4e3;--surface2:#f8ead0;--border:#c9a22780;
  --spell-purple:#3a1f5c;--spell-purple-light:#5c3a8a;
  --feat-green:#1a3a1a;--feat-green-light:#2e6a2e;
  --bg-brown:#3a2a10;--bg-brown-light:#6a4a20;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--shadow);font-family:'Crimson Text',Georgia,serif;color:var(--ink);min-height:100vh;}
header{background:linear-gradient(180deg,#0d0704,#1a0f05 50%,#2a1505);border-bottom:3px solid var(--gold);padding:1.1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
header h1{font-family:'Cinzel',serif;font-size:1.5rem;color:var(--gold-light);letter-spacing:.08em;text-shadow:0 0 20px rgba(201,162,39,.4);}
header h1 span{color:var(--parchment-deep);font-weight:400;font-size:.8rem;display:block;letter-spacing:.15em;}
.tabs{display:flex;gap:4px;}
.tab-btn{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.07em;padding:.42rem .9rem;border:1px solid var(--gold);background:transparent;color:var(--parchment-dark);cursor:pointer;transition:all .2s;border-radius:3px;}
.tab-btn:hover{background:rgba(201,162,39,.15);color:var(--gold-light);}
.tab-btn.active{background:var(--gold);color:var(--shadow);font-weight:600;}
main{max-width:1200px;margin:0 auto;padding:1.5rem 2rem;}
.panel{display:none;}.panel.active{display:block;}

/* collapsible form */
.add-section{background:var(--surface2);border:1px solid var(--border);border-radius:6px;margin-bottom:1.4rem;box-shadow:0 2px 12px rgba(0,0,0,.4);overflow:hidden;}
.add-section-toggle{width:100%;background:none;border:none;padding:.85rem 1.2rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:'Cinzel',serif;font-size:.88rem;letter-spacing:.06em;color:var(--ink-mid);transition:background .15s;}
.add-section-toggle:hover{background:rgba(201,162,39,.08);}
.add-section-toggle .arrow{font-size:.65rem;color:var(--ink-light);transition:transform .2s;}
.add-section-toggle.open .arrow{transform:rotate(180deg);}
.add-section-body{padding:0 1.2rem 1.2rem;display:none;}.add-section-body.open{display:block;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:.6rem;margin-bottom:.7rem;}
.form-group{display:flex;flex-direction:column;gap:3px;}
.form-group label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;color:var(--ink-light);text-transform:uppercase;}
.form-group input,.form-group select{font-family:'Crimson Text',serif;font-size:.93rem;padding:4px 7px;border:1px solid var(--parchment-deep);border-radius:4px;background:var(--parchment);color:var(--ink);}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--gold);}
.form-row{display:flex;gap:.7rem;align-items:flex-end;margin-top:.5rem;flex-wrap:wrap;}
.form-row .form-group{flex:1;min-width:120px;}
.add-btn{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.07em;padding:6px 16px;border:1px solid var(--gold);border-radius:4px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.add-btn.hero-btn{background:var(--hero-blue);color:var(--gold-light);}
.add-btn.hero-btn:hover{background:var(--hero-blue-light);}
.add-btn.enemy-btn{background:var(--enemy-red);color:var(--gold-light);}
.add-btn.enemy-btn:hover{background:var(--enemy-red-light);}

/* cards */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1.2rem;}
.section-label{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.15em;color:var(--ink-light);text-transform:uppercase;margin-bottom:.7rem;display:flex;align-items:center;gap:.75rem;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.card{background:var(--surface);border-radius:6px;border:1px solid var(--border);overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.3);position:relative;}
.card.collapsed .card-body{display:none;}
.card.collapsed .card-header{border-bottom-left-radius:6px;border-bottom-right-radius:6px;}
.card-header{padding:.6rem .9rem;display:flex;align-items:center;justify-content:space-between;gap:.45rem;}
.card.hero .card-header{background:linear-gradient(135deg,var(--hero-blue),var(--hero-blue-light));}
.card.enemy .card-header{background:linear-gradient(135deg,var(--enemy-red),var(--enemy-red-light));}
.card.enemy.npc .card-header{background:linear-gradient(135deg,rgba(108, 86, 18, 0.95),rgba(220, 164, 33, 0.95));}
.card-header h3{font-family:'Cinzel',serif;font-size:.9rem;color:var(--gold-light);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;}
.class-badge{font-size:.62rem;background:rgba(255,255,255,.15);color:var(--parchment);padding:2px 7px;border-radius:20px;border:1px solid rgba(255,255,255,.2);white-space:nowrap;flex-shrink:0;}
.class-badge.npc{background:rgba(241,196,15,.95);color:var(--shadow);border-color:rgba(204,153,0,.8);}
.card-actions{display:flex;gap:3px;margin-left:auto;flex-shrink:0;}
.icon-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.55);font-size:.85rem;padding:2px 4px;transition:color .15s;font-family:'Cinzel',serif;letter-spacing:.04em;}
.icon-btn:hover{color:#fff;}
.card-body{padding:.65rem .9rem;}

/* HP */
.hp-row{display:flex;align-items:center;gap:7px;margin-bottom:.45rem;}
.hp-label{font-family:'Cinzel',serif;font-size:.58rem;color:var(--ink-light);letter-spacing:.1em;width:18px;flex-shrink:0;}
.hp-bar-wrap{flex:1;height:10px;background:var(--parchment-dark);border-radius:6px;overflow:hidden;border:1px solid var(--parchment-deep);}
.hp-bar{height:100%;border-radius:6px;transition:width .4s,background .3s;}
.hp-nums{font-family:'Cinzel',serif;font-size:.72rem;color:var(--ink-mid);min-width:50px;text-align:right;white-space:nowrap;}
.hp-controls{display:flex;gap:5px;margin-bottom:.55rem;}
.hp-ctrl-btn{flex:1;font-family:'Crimson Text',serif;font-size:.8rem;padding:3px 0;border-radius:4px;border:1px solid;cursor:pointer;font-weight:600;transition:all .15s;background:transparent;}
.hp-ctrl-btn.damage{border-color:var(--blood);color:var(--blood-light);}
.hp-ctrl-btn.damage:hover{background:var(--blood);color:#fff;}
.hp-ctrl-btn.heal{border-color:var(--hp-green);color:var(--hp-green);}
.hp-ctrl-btn.heal:hover{background:var(--hp-green);color:#fff;}
.hp-ctrl-btn.temp{border-color:var(--hero-blue-light);color:var(--hero-blue-light);flex:.65;}
.hp-ctrl-btn.temp:hover{background:var(--hero-blue-light);color:#fff;}
.hp-amount-input{width:100%;font-family:'Cinzel',serif;font-size:.83rem;padding:3px 8px;border:1px solid var(--parchment-deep);border-radius:4px;background:var(--parchment-dark);color:var(--ink);margin-bottom:4px;text-align:center;}
.hp-amount-input:focus{outline:none;border-color:var(--gold);}

/* stat blocks */
.combat-stats{display:flex;gap:5px;margin-bottom:.55rem;}
.combat-stat-box{flex:1;background:var(--parchment-dark);border:1px solid var(--parchment-deep);border-radius:4px;padding:4px 2px;text-align:center;}
.cstat-val{font-family:'Cinzel',serif;font-size:.97rem;font-weight:700;color:var(--ink);line-height:1;}
.cstat-name{font-size:.55rem;color:var(--ink-light);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.ability-scores{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:.55rem;}
.ability-box{background:var(--parchment-dark);border:1px solid var(--parchment-deep);border-radius:4px;padding:4px 2px 3px;text-align:center;}
.ab-name{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.05em;color:var(--ink-light);text-transform:uppercase;line-height:1;margin-bottom:2px;}
.ab-mod{font-family:'Cinzel',serif;font-size:.97rem;font-weight:700;color:var(--ink);line-height:1;}
.ab-score{font-family:'Crimson Text',serif;font-size:.68rem;color:var(--ink-mid);line-height:1;margin-top:2px;border-top:1px solid var(--parchment-deep);padding-top:2px;}

/* spell slots config */
.spell-slots-section{margin-bottom:.55rem;}
.spell-slots-header{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.12em;color:var(--ink-light);text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:.5rem;}
.spell-slots-header::after{content:'';flex:1;height:1px;background:var(--border);}
.slot-cfg-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;}
.slot-cfg-cell{display:flex;flex-direction:column;align-items:center;gap:2px;}
.slot-cfg-label{font-family:'Cinzel',serif;font-size:.48rem;color:var(--ink-light);letter-spacing:.04em;white-space:nowrap;}
.slot-cfg-input{width:100%;font-family:'Cinzel',serif;font-size:.78rem;padding:3px 2px;border:1px solid var(--parchment-deep);border-radius:3px;background:var(--parchment-dark);color:var(--ink);text-align:center;}
.slot-cfg-input:focus{outline:none;border-color:var(--gold);}

/* background/feat tags on card */
.char-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:.5rem;}
.char-tag{font-size:.6rem;padding:2px 8px;border-radius:20px;font-family:'Crimson Text',serif;font-style:italic;border:1px solid;}
.char-tag.bg-tag{background:rgba(58,42,16,.2);border-color:var(--bg-brown-light);color:var(--bg-brown-light);}
.char-tag.feat-tag{background:rgba(26,58,26,.2);border-color:var(--feat-green-light);color:var(--feat-green-light);}

/* conditions */
.conditions-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:.5rem;}
.condition-tag{font-size:.6rem;padding:2px 6px;border-radius:20px;border:1px solid;cursor:pointer;letter-spacing:.03em;transition:all .15s;font-family:'Crimson Text',serif;font-style:italic;user-select:none;}
.condition-tag.active{background:var(--blood);border-color:var(--blood-light);color:#fff;}
.condition-tag:not(.active){background:transparent;border-color:var(--parchment-deep);color:var(--ink-light);}
.condition-tag:not(.active):hover{border-color:var(--blood);color:var(--blood);}
.notes-field{width:100%;font-family:'Crimson Text',serif;font-size:.82rem;padding:4px 7px;border:1px solid var(--parchment-deep);border-radius:4px;background:var(--parchment-dark);color:var(--ink);resize:vertical;min-height:34px;line-height:1.4;}
.notes-field:focus{outline:none;border-color:var(--gold);}
.dead-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;border-radius:6px;font-family:'Cinzel',serif;color:var(--blood-light);font-size:1.35rem;letter-spacing:.1em;}

/* Skills tabbed */
.skills-tabs-bar{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:1rem;}
.skills-tab-btn{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.06em;padding:.35rem .85rem;border:1px solid var(--border);background:var(--surface2);color:var(--ink-mid);cursor:pointer;transition:all .2s;border-radius:4px;}
.skills-tab-btn:hover{border-color:var(--gold);color:var(--gold);}
.skills-tab-btn.active{background:var(--hero-blue);border-color:var(--hero-blue-light);color:var(--gold-light);}
.skills-pane{display:none;}.skills-pane.active{display:block;}
.skills-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.4);max-width:480px;}
.skills-card-header{background:linear-gradient(135deg,var(--hero-blue),var(--hero-blue-light));padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between;}
.skills-card-header h3{font-family:'Cinzel',serif;font-size:.92rem;color:var(--gold-light);}
.skills-card-header .prof-bonus{font-family:'Cinzel',serif;font-size:.72rem;color:var(--parchment);}
.skills-list{padding:.4rem .7rem;}
.skill-row{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:1px solid rgba(201,162,39,.12);}
.skill-row:last-child{border-bottom:none;}
.skill-prof-btn{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--parchment-deep);background:transparent;cursor:pointer;flex-shrink:0;transition:all .15s;position:relative;}
.skill-prof-btn.prof{background:var(--hero-blue-light);border-color:var(--hero-blue-light);}
.skill-prof-btn.expertise{background:var(--gold);border-color:var(--gold);}
.skill-prof-btn.prof::after{content:'';position:absolute;inset:3px;border-radius:50%;background:rgba(255,255,255,.4);}
.skill-prof-btn.expertise::after{content:'★';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--shadow);line-height:14px;text-align:center;}
.skill-name{font-family:'Crimson Text',serif;font-size:.88rem;color:var(--ink);flex:1;}
.skill-ability{font-family:'Cinzel',serif;font-size:.52rem;color:var(--ink-light);letter-spacing:.06em;width:24px;text-align:right;}
.skill-total{font-family:'Cinzel',serif;font-size:.82rem;font-weight:600;color:var(--ink-mid);width:26px;text-align:right;}

/* combat */
.init-controls{display:flex;gap:.7rem;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap;}
.init-btn{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.06em;padding:5px 13px;border-radius:4px;border:1px solid var(--gold);cursor:pointer;transition:all .2s;}
.init-btn.primary{background:var(--gold);color:var(--shadow);}
.init-btn.primary:hover{background:var(--gold-light);}
.init-btn.secondary{background:transparent;color:var(--gold);}
.init-btn.secondary:hover{background:rgba(201,162,39,.15);}
.round-display{font-family:'Cinzel',serif;font-size:.97rem;color:var(--gold-light);margin-left:auto;letter-spacing:.05em;}
.init-list{display:flex;flex-direction:column;gap:7px;}
.init-entry{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.6rem .9rem;display:flex;align-items:flex-start;gap:.9rem;box-shadow:0 2px 8px rgba(0,0,0,.3);transition:all .2s;}
.init-entry.hero{border-left:4px solid var(--hero-blue-light);}
.init-entry.enemy{border-left:4px solid var(--blood-light);}
.init-entry.enemy.npc{border-left-color:rgba(245,205,80,.9);}
.init-entry.active-turn{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,162,39,.3),0 2px 12px rgba(0,0,0,.4);transform:translateX(6px);}
.init-num{font-family:'Cinzel',serif;font-size:1.15rem;font-weight:700;color:var(--gold);width:32px;text-align:center;flex-shrink:0;padding-top:2px;}
.init-input{width:44px;font-family:'Cinzel',serif;font-size:.88rem;text-align:center;padding:2px 3px;border:1px solid var(--parchment-deep);border-radius:3px;background:var(--parchment-dark);color:var(--ink);flex-shrink:0;}
.init-main{flex:1;min-width:0;}
.init-name{font-family:'Cinzel',serif;font-size:.85rem;color:var(--ink);font-weight:600;}
.init-sub{font-size:.68rem;color:var(--ink-light);margin-top:1px;}
.init-hp-mini{font-family:'Crimson Text',serif;font-size:.83rem;color:var(--ink-mid);white-space:nowrap;}
.cond-pip{font-size:.56rem;padding:1px 5px;background:var(--blood);color:#fff;border-radius:10px;font-style:italic;}
.init-spells{display:flex;flex-direction:column;gap:3px;margin-top:4px;}
.init-spell-row{display:flex;align-items:center;gap:4px;}
.init-spell-label{font-family:'Cinzel',serif;font-size:.53rem;color:var(--ink-light);width:20px;text-align:right;flex-shrink:0;}
.init-spell-pip{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--spell-purple-light);cursor:pointer;transition:background .12s;flex-shrink:0;}
.init-spell-pip.used{background:var(--spell-purple);border-color:var(--spell-purple);}
.init-spell-pip:hover{border-color:var(--gold);}
.init-hp-controls{display:flex;flex-direction:column;gap:4px;flex-shrink:0;align-items:flex-end;}
.init-amt{width:50px;font-family:'Cinzel',serif;font-size:.75rem;padding:2px 4px;border:1px solid var(--parchment-deep);border-radius:3px;background:var(--parchment-dark);color:var(--ink);text-align:center;}
.init-dmg-heal{display:flex;gap:3px;}
.init-ctrl{font-size:.62rem;padding:2px 5px;border-radius:3px;border:1px solid;cursor:pointer;background:transparent;font-family:'Cinzel',serif;transition:all .12s;}
.init-ctrl.d{border-color:var(--blood);color:var(--blood-light);}
.init-ctrl.d:hover{background:var(--blood);color:#fff;}
.init-ctrl.h{border-color:var(--hp-green);color:var(--hp-green);}
.init-ctrl.h:hover{background:var(--hp-green);color:#fff;}
.init-conds{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;}

/* modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal-backdrop.hidden{display:none;}
.modal{background:var(--surface);border:2px solid var(--gold);border-radius:8px;padding:1.5rem;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.8);}
.modal h2{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--ink-mid);margin-bottom:1rem;letter-spacing:.05em;border-bottom:1px solid var(--border);padding-bottom:.5rem;}
.modal .form-grid{grid-template-columns:repeat(auto-fit,minmax(110px,1fr));}
.modal-btns{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1rem;flex-wrap:wrap;}
.modal-btn{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.06em;padding:6px 15px;border-radius:4px;border:1px solid;cursor:pointer;transition:all .2s;}
.modal-btn.save{background:var(--hero-blue);border-color:var(--hero-blue-light);color:var(--gold-light);}
.modal-btn.save:hover{background:var(--hero-blue-light);}
.modal-btn.cancel{background:transparent;border-color:var(--ink-light);color:var(--ink-mid);}
.modal-btn.cancel:hover{background:rgba(0,0,0,.1);}

/* modal toggle groups (backgrounds / feats) */
.modal-section-label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.12em;color:var(--ink-light);text-transform:uppercase;margin:1rem 0 .5rem;display:flex;align-items:center;gap:.6rem;}
.modal-section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.toggle-group{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.4rem;}
.toggle-chip{font-family:'Crimson Text',serif;font-size:.8rem;padding:3px 10px;border-radius:20px;border:1px solid;cursor:pointer;transition:all .15s;user-select:none;font-style:italic;}
.toggle-chip.bg-chip{border-color:var(--bg-brown-light);color:var(--bg-brown-light);}
.toggle-chip.bg-chip.sel{background:var(--bg-brown);border-color:var(--gold);color:var(--gold-light);}
.toggle-chip.feat-chip{border-color:var(--feat-green-light);color:var(--feat-green-light);}
.toggle-chip.feat-chip.sel{background:var(--feat-green);border-color:#6aaa6a;color:#aaeaaa;}
.feat-preview{font-family:'Crimson Text',serif;font-size:.8rem;color:var(--ink-mid);font-style:italic;padding:.35rem .6rem;background:var(--parchment-dark);border-radius:4px;border:1px solid var(--parchment-deep);margin-top:.3rem;line-height:1.5;}

/* io bar */
.io-bar{display:flex;gap:.5rem;align-items:center;margin-bottom:.8rem;flex-wrap:wrap;}
.io-btn{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.06em;padding:5px 13px;border-radius:4px;border:1px solid var(--gold);cursor:pointer;transition:all .2s;background:transparent;color:var(--gold);}
.io-btn:hover{background:rgba(201,162,39,.15);}
.io-btn.export{background:rgba(30,60,30,.4);border-color:#4a8a4a;color:#8aba8a;}
.io-btn.export:hover{background:rgba(30,60,30,.7);}
.io-btn.import{background:rgba(60,30,10,.4);border-color:var(--parchment-deep);color:var(--parchment-dark);}
.io-btn.import:hover{background:rgba(60,30,10,.7);}

@media(max-width:640px){
  header{flex-direction:column;gap:.6rem;align-items:flex-start;}
  .tabs{width:100%;}.tab-btn{flex:1;text-align:center;font-size:.62rem;padding:.38rem .3rem;}
  main{padding:1rem;}.form-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<header>
  <h1>⚔ DM Tracker <span>Dungeons & Dragons 5th Edition</span></h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('characters')">Characters</button>
    <button class="tab-btn" onclick="switchTab('enemies')">Enemies</button>
    <button class="tab-btn" onclick="switchTab('skills')">Skills</button>

        <div class="form-group"><label>DEX</label><input id="pc-dex" type="number" min="1" max="30" placeholder="10"></div>

  <div class="cards-grid" id="characters-grid"></div>
</div>

<!-- ══ ENEMIES ══ -->
<div id="panel-enemies" class="panel">

function buildClassOptions(sel,cur){
  sel.innerHTML='';let last='';
  CLASSES_SUBCLASSES.forEach(({cls,sub})=>{
    if(cls!==last){const og=document.createElement('optgroup');og.label=cls;sel.appendChild(og);last=cls;}
    const opt=document.createElement('option');
    opt.value=`${cls} — ${sub}`;opt.textContent=sub;
    if(cur&&opt.value===cur)opt.selected=true;
    sel.lastChild.appendChild(opt);
  });
  if(!cur)sel.selectedIndex=0;
}

function uid(){return Math.random().toString(36).slice(2,9);}
function modNum(s){return Math.floor((s-10)/2);}
function mod(s){const m=modNum(s);return(m>=0?'+':'')+m;}
function hpColor(hp,max){const p=hp/max;return p>.6?'#2d6a23':p>.25?'#8a7215':'#8b1a1a';}
function pb(lv){return Math.ceil(lv/4)+1;}
function defaultSlots(){return Array.from({length:9},()=>({max:0,used:0}));}
function ordinal(n){return n===1?'1st':n===2?'2nd':n===3?'3rd':n+'th';}

// Compute effective stats (base + background + feats)
function effectiveStats(e){
  const base={str:e.str,dex:e.dex,con:e.con,int:e.int,wis:e.wis,cha:e.cha};
  if(e.type!=='hero') return base;
  const bumps={str:0,dex:0,con:0,int:0,wis:0,cha:0};
  // background
  if(e.background){
    const bg=BACKGROUNDS.find(b=>b.name===e.background);
    if(bg)Object.entries(bg.stats).forEach(([k,v])=>{bumps[k]=(bumps[k]||0)+v;});
  }
  // feats
  (e.feats||[]).forEach(fname=>{
    const ft=FEATS.find(f=>f.name===fname);
    if(ft)Object.entries(ft.stats).forEach(([k,v])=>{bumps[k]=(bumps[k]||0)+v;});
  });
  const out={};
  Object.keys(base).forEach(k=>{out[k]=Math.min(30,base[k]+(bumps[k]||0));});
  return out;
}

function renderEntityCard(entity,container){
  const eff=effectiveStats(entity);
  const pct=Math.max(0,entity.hp/entity.maxhp);
  const isDead=entity.hp<=0;
  const collapsed = !!entity.collapsed;
  const isEnemy = entity.type==='enemy';
  const typeLabel=entity.type==='hero'?(entity.cls||'Hero'):(entity.etype||'Enemy');
  const badgeClass=entity.type==='hero'?'class-badge':'';
  const cardClass=`card ${entity.type}${collapsed?' collapsed':''}${isEnemy&&entity.isNPC?' npc':''}`;
  const card=document.createElement('div');
  card.className=cardClass;
  card.id='card-'+entity.id;

  const slots=entity.spellSlots||defaultSlots();
  const slotInputs=slots.map((s,i)=>`
    <div class="slot-cfg-cell">
      <div class="slot-cfg-label">${ordinal(i+1)}</div>
      <input class="slot-cfg-input" type="number" min="0" max="9" value="${s.max||''}" placeholder="—"
        onchange="setSlotMax('${entity.id}',${i},this.value)" onclick="event.stopPropagation()">
    </div>`).join('');

  // background + feat tags on card (hero only)
  let tagsHtml='';
  if(entity.type==='hero'){
    const parts=[];
    if(entity.background) parts.push(`<span class="char-tag bg-tag">⚜ ${entity.background}</span>`);
    (entity.feats||[]).forEach(f=>parts.push(`<span class="char-tag feat-tag">★ ${f}</span>`));
    if(parts.length) tagsHtml=`<div class="char-tags">${parts.join('')}</div>`;
  }

  const checkHtml=`<input type="checkbox" id="sel-${entity.id}" style="cursor:pointer;accent-color:var(--gold)" title="Select for export">`;
  const collapseIcon=collapsed?'▸':'▾';

  card.innerHTML=`
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0">
        ${checkHtml}
        <div style="min-width:0">
          <h3 title="${entity.name}">${entity.name}</h3>
          ${entity.player?`<div style="font-size:.58rem;color:rgba(255,255,255,.6);margin-top:1px">${entity.player}</div>`:''}
        </div>
      </div>
      ${entity.type==='hero'?`<span class="${badgeClass}">${typeLabel}</span>`:''}
      <div class="card-actions">
        <button class="icon-btn" onclick="moveEntity('${entity.id}',-1,event)" title="Move up">↑</button>
        <button class="icon-btn" onclick="moveEntity('${entity.id}',1,event)" title="Move down">↓</button>
        <button class="icon-btn" onclick="toggleCardCollapse('${entity.id}',event)" title="Toggle details">${collapseIcon}</button>
        ${entity.type==='enemy'?`<button class="icon-btn" onclick="toggleEnemyNpc('${entity.id}',event)" title="${entity.isNPC?'Switch to Enemy':'Switch to NPC'}">${entity.isNPC?'NPC':'Enemy'}</button>`:''}
        <button class="icon-btn" onclick="openEditModal('${entity.id}')" title="Edit">✎</button>
        <button class="icon-btn" onclick="removeEntity('${entity.id}')" title="Remove">✕</button>
      </div>
    </div>
    <div class="card-body">
      ${tagsHtml}
      <div class="hp-row">
        <span class="hp-label">HP</span>
        <div class="hp-bar-wrap"><div class="hp-bar" style="width:${Math.round(pct*100)}%;background:${hpColor(entity.hp,entity.maxhp)}"></div></div>
        <span class="hp-nums">${entity.hp}${entity.temphp>0?'+'+entity.temphp:''} / ${entity.maxhp}</span>
      </div>
      <input class="hp-amount-input" id="amt-${entity.id}" type="number" min="0" placeholder="Amount" value="1">
      <div class="hp-controls">
        <button class="hp-ctrl-btn damage" onclick="applyHP('${entity.id}','damage')">⚔ Damage</button>
        <button class="hp-ctrl-btn heal" onclick="applyHP('${entity.id}','heal')">✦ Heal</button>
        <button class="hp-ctrl-btn temp" onclick="applyHP('${entity.id}','temp')">⬡ Temp</button>
      </div>
      <div class="combat-stats">
        <div class="combat-stat-box"><div class="cstat-val">${entity.ac}</div><div class="cstat-name">AC</div></div>
        <div class="combat-stat-box"><div class="cstat-val">${entity.speed}</div><div class="cstat-name">Speed</div></div>
        <div class="combat-stat-box"><div class="cstat-val">${entity.type==='hero'?entity.level:'—'}</div><div class="cstat-name">${entity.type==='hero'?'Level':'CR'}</div></div>
      </div>
      <div class="ability-scores">
        ${[['STR','str'],['DEX','dex'],['CON','con'],['INT','int'],['WIS','wis'],['CHA','cha']].map(([n,k])=>`
          <div class="ability-box">
            <div class="ab-name">${n}</div>
            <div class="ab-mod">${mod(eff[k])}</div>
            <div class="ab-score">${eff[k]}${eff[k]!==entity[k]?`<sup style="color:var(--feat-green-light)">+${eff[k]-entity[k]}</sup>`:''}</div>
          </div>`).join('')}
      </div>

      </div>
      <textarea class="notes-field" placeholder="Notes…" onchange="updateNotes('${entity.id}',this.value)">${entity.notes||''}</textarea>

            <span style="color:var(--ink-light);font-size:.72rem;margin:0 3px">Succ</span>
            ${[0,1,2].map(i=>`<span onclick="cycleDeathSave('${entity.id}','fail',${i})" style="cursor:pointer;font-size:.95rem">${i<(entity.deathSaves?.fail||0)?'❌':'⬜'}</span>`).join('')}
            <span style="color:var(--ink-light);font-size:.72rem">Fail</span>
          </div>
        </div>`:''}
    </div>
    ${isDead?`<div class="dead-overlay">☠ FALLEN</div>`:''}
  `;
  container.appendChild(card);
}

function renderCharacters(){const g=document.getElementById('characters-grid');g.innerHTML='';state.characters.forEach(c=>renderEntityCard(c,g));}

let activeSkillTab=null;
function renderSkills(){
  const bar=document.getElementById('skills-tabs-bar');
  const panes=document.getElementById('skills-panes');
  const empty=document.getElementById('skills-empty');
  bar.innerHTML='';panes.innerHTML='';
  if(!state.characters.length){empty.style.display='block';bar.style.display='none';return;}
  empty.style.display='none';bar.style.display='flex';
  if(!activeSkillTab||!state.characters.find(c=>c.id===activeSkillTab)) activeSkillTab=state.characters[0].id;
  state.characters.forEach(ch=>{
    const isActive=ch.id===activeSkillTab;
    const btn=document.createElement('button');
    btn.className='skills-tab-btn'+(isActive?' active':'');
    btn.textContent=ch.name;
    btn.onclick=()=>{activeSkillTab=ch.id;renderSkills();};
    bar.appendChild(btn);
    const eff=effectiveStats(ch);
    const pane=document.createElement('div');
    pane.className='skills-pane'+(isActive?' active':'');
    const pbVal=ch.profBonus||pb(ch.level);
    pane.innerHTML=`
      <div class="skills-card">
        <div class="skills-card-header">
          <h3>${ch.name}</h3>
          <span class="prof-bonus">Prof +${pbVal}${ch.player?' · '+ch.player:''}</span>
        </div>
        <div class="skills-list" id="skills-list-${ch.id}"></div>
      </div>`;
    panes.appendChild(pane);
    const list=pane.querySelector(`#skills-list-${ch.id}`);
    SKILLS.forEach(skill=>{
      const base=modNum(eff[skill.ability]||10);
      const prof=ch.skillProfs?.[skill.name]||'none';
      const bonus=prof==='expertise'?base+pbVal*2:prof==='prof'?base+pbVal:base;
      const row=document.createElement('div');
      row.className='skill-row';
      row.innerHTML=`
        <button class="skill-prof-btn ${prof==='none'?'':prof}" onclick="cycleSkillProf('${ch.id}','${skill.name}',this)"></button>
        <span class="skill-name">${skill.name}</span>
        <span class="skill-ability">${skill.ability.toUpperCase()}</span>
        <span class="skill-total" id="sk-total-${ch.id}-${skill.name.replace(/\s/g,'_')}">${bonus>=0?'+':''}${bonus}</span>`;
      list.appendChild(row);
    });
  });
}

function cycleSkillProf(charId,skillName,btn){
  const ch=state.characters.find(c=>c.id===charId);if(!ch)return;
  if(!ch.skillProfs)ch.skillProfs={};
  const cur=ch.skillProfs[skillName]||'none';
  const next=cur==='none'?'prof':cur==='prof'?'expertise':'none';
  ch.skillProfs[skillName]=next;save();
  btn.className='skill-prof-btn '+(next==='none'?'':next);
  const pbVal=ch.profBonus||pb(ch.level);
  const skill=SKILLS.find(s=>s.name===skillName);
  const eff=effectiveStats(ch);
  const base=modNum(eff[skill.ability]||10);
  const bonus=next==='expertise'?base+pbVal*2:next==='prof'?base+pbVal:base;
  const el=document.getElementById(`sk-total-${charId}-${skillName.replace(/\s/g,'_')}`);
  if(el)el.textContent=(bonus>=0?'+':'')+bonus;
}

function setSlotMax(entityId,levelIdx,val){
  const e=getEntity(entityId);if(!e)return;
  if(!e.spellSlots)e.spellSlots=defaultSlots();
  const n=Math.max(0,Math.min(9,parseInt(val)||0));
  e.spellSlots[levelIdx].max=n;
  if(e.spellSlots[levelIdx].used>n)e.spellSlots[levelIdx].used=n;
  save();if(document.getElementById('panel-combat').classList.contains('active'))renderCombat();
}
function toggleSlotCombat(entityId,levelIdx,pipIdx){
  const e=getEntity(entityId);if(!e)return;
  if(!e.spellSlots)e.spellSlots=defaultSlots();
  const slot=e.spellSlots[levelIdx];
  slot.used=pipIdx<slot.used?pipIdx:pipIdx+1;
  slot.used=Math.max(0,Math.min(slot.max,slot.used));
  save();refreshCard(entityId);renderCombat();
}

// ═══════════════════════════════════════════
//  ENTITY HELPERS
// ═══════════════════════════════════════════
function getEntity(id){return state.characters.find(e=>e.id===id)||state.enemies.find(e=>e.id===id);}
function refreshCard(id){
  const e=getEntity(id);if(!e)return;
  const card=document.getElementById('card-'+id);if(!card)return;
  const tmp=document.createElement('div');renderEntityCard(e,tmp);card.replaceWith(tmp.firstChild);
}
function scrollCombatEntry(id){
  const el=document.getElementById('combat-entry-'+id);
  if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}
function applyHP(id,mode){
  const e=getEntity(id);if(!e)return;
  const wasAlive=e.hp>0;
  const amt=Math.abs(parseFloat(document.getElementById('amt-'+id).value)||0);
  if(mode==='damage'){let r=amt;if(e.temphp>0){const a=Math.min(e.temphp,r);e.temphp-=a;r-=a;}e.hp=Math.max(0,e.hp-r);}
  else if(mode==='heal'){e.hp=Math.min(e.maxhp,e.hp+amt);}
  else{e.temphp=Math.max(e.temphp,amt);}
  const becameDown=e.type==='hero'&&wasAlive&&e.hp===0;
  save();refreshCard(id);
  if(document.getElementById('panel-combat').classList.contains('active')){
    renderCombat();
    if(becameDown)scrollCombatEntry(id);
  }
}
function applyHPCombat(id,mode){
  const e=getEntity(id);if(!e)return;
  const wasAlive=e.hp>0;
  const inp=document.getElementById('combat-amt-'+id);
  const amt=Math.abs(parseFloat(inp?inp.value:1)||1);
  if(mode==='damage'){let r=amt;if(e.temphp>0){const a=Math.min(e.temphp,r);e.temphp-=a;r-=a;}e.hp=Math.max(0,e.hp-r);}
  else{e.hp=Math.min(e.maxhp,e.hp+amt);}
  const becameDown=e.type==='hero'&&wasAlive&&e.hp===0;
  save();refreshCard(id);renderCombat();
  if(becameDown)scrollCombatEntry(id);
}
function toggleCondition(id,cond){
  const e=getEntity(id);if(!e)return;
  const idx=e.conditions.indexOf(cond);
  if(idx===-1)e.conditions.push(cond);else e.conditions.splice(idx,1);
  save();
  const el=document.querySelector(`#conds-${id} .condition-tag[onclick*="'${cond}'"]`);
  if(el)el.classList.toggle('active');
  if(document.getElementById('panel-combat').classList.contains('active'))renderCombat();
}
function moveEntity(id,dir,event){
  event.stopPropagation();
  const e=getEntity(id);if(!e)return;
  const list=e.type==='hero'?state.characters:state.enemies;
  const index=list.findIndex(item=>item.id===id);
  if(index===-1) return;
  const target=index+dir;
  if(target<0||target>=list.length) return;
  [list[index],list[target]]=[list[target],list[index]];
  save();
  if(e.type==='hero') renderCharacters(); else renderEnemies();
}
function toggleCardCollapse(id,event){
  event.stopPropagation();
  const e=getEntity(id);if(!e)return;
  e.collapsed=!e.collapsed;
  save();refreshCard(id);
}
function toggleEnemyNpc(id,event){
  event.stopPropagation();
  const e=getEntity(id);if(!e||e.type!=='enemy')return;
  e.isNPC=!e.isNPC;
  save();refreshCard(id);
}
function updateNotes(id,val){const e=getEntity(id);if(e){e.notes=val;save();}}
function removeEntity(id){
  if(!confirm('Remove this entry?'))return;
  state.characters=state.characters.filter(e=>e.id!==id);
  state.enemies=state.enemies.filter(e=>e.id!==id);
  save();renderCharacters();renderEnemies();
  if(document.getElementById('panel-combat').classList.contains('active'))renderCombat();
  if(document.getElementById('panel-skills').classList.contains('active'))renderSkills();
}
function cycleDeathSave(id,type,index){
  const e=getEntity(id);if(!e)return;
  if(!e.deathSaves)e.deathSaves={success:0,fail:0};
  e.deathSaves[type]=(e.deathSaves[type]===index+1)?index:index+1;
  save();
  if(document.getElementById('panel-combat').classList.contains('active'))renderCombat();
  else refreshCard(id);
}

    {id:'e-con',label:'CON (base)',val:e.con,type:'number'},
    {id:'e-int',label:'INT (base)',val:e.int,type:'number'},
    {id:'e-wis',label:'WIS (base)',val:e.wis,type:'number'},
    {id:'e-cha',label:'CHA (base)',val:e.cha,type:'number'},
    {id:'e-prof',label:'Prof Bonus',val:e.profBonus||2,type:'number'},
  ]:[
    {id:'e-name',label:'Name',val:e.name,type:'text'},
    {id:'e-etype',label:'Type / CR',val:e.etype||'',type:'text'},
    {id:'e-maxhp',label:'Max HP',val:e.maxhp,type:'number'},
    {id:'e-ac',label:'AC',val:e.ac,type:'number'},
    {id:'e-speed',label:'Speed',val:e.speed,type:'number'},
    {id:'e-str',label:'STR',val:e.str,type:'number'},
    {id:'e-dex',label:'DEX',val:e.dex,type:'number'},
    {id:'e-con',label:'CON',val:e.con,type:'number'},
    {id:'e-int',label:'INT',val:e.int,type:'number'},
    {id:'e-wis',label:'WIS',val:e.wis,type:'number'},
    {id:'e-cha',label:'CHA',val:e.cha,type:'number'},
  ];

  baseFields.forEach(f=>{
    grid.innerHTML+=`<div class="form-group"><label>${f.label}</label><input id="${f.id}" type="${f.type}" value="${f.val}"></div>`;
  });

  if(e.type==='hero'){
    // Class select
    extra.innerHTML+=`<div class="form-group" style="margin-top:.7rem"><label style="font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;color:var(--ink-light);text-transform:uppercase">Class / Subclass</label><select id="e-cls"></select></div>`;
    buildClassOptions(document.getElementById('e-cls'),e.cls);

    // Background chips
    extra.innerHTML+=`<div class="modal-section-label">Background <span style="font-style:italic;font-weight:400;font-size:.7rem;letter-spacing:0;text-transform:none">(grants stat bumps)</span></div>
      <div class="toggle-group" id="bg-toggle-group">
        ${BACKGROUNDS.map(b=>`<span class="toggle-chip bg-chip${e.background===b.name?' sel':''}" onclick="toggleBg(this,'${b.name.replace(/'/g,"\\'")}','${id}')"
          title="${Object.entries(b.stats).map(([k,v])=>k.toUpperCase()+'+'+v).join(', ')}">${b.name}</span>`).join('')}
      </div>
      <div id="bg-preview" class="feat-preview" style="${e.background?'':'display:none'}"></div>`;
    updateBgPreview(e);

    // Feat chips
    extra.innerHTML+=`<div class="modal-section-label">Feats <span style="font-style:italic;font-weight:400;font-size:.7rem;letter-spacing:0;text-transform:none">(click to toggle — stat increases applied automatically)</span></div>
      <div class="toggle-group" id="feat-toggle-group">
        ${FEATS.map(f=>`<span class="toggle-chip feat-chip${(e.feats||[]).includes(f.name)?' sel':''}" onclick="toggleFeat(this,'${f.name.replace(/'/g,"\\'")}','${id}')"
          title="${f.desc}">${f.name}</span>`).join('')}
      </div>
      <div id="feat-preview" class="feat-preview" style="display:none"></div>`;
  }

  document.getElementById('edit-modal').classList.remove('hidden');
}

function updateBgPreview(e){
  const pre=document.getElementById('bg-preview');if(!pre)return;
  if(!e.background){pre.style.display='none';return;}
  const bg=BACKGROUNDS.find(b=>b.name===e.background);
  if(!bg){pre.style.display='none';return;}
  const bumps=Object.entries(bg.stats).map(([k,v])=>k.toUpperCase()+' +'+v).join(', ');
  pre.textContent=`${e.background}: ${bumps}`;
  pre.style.display='block';
}

function toggleBg(chip,bgName,entityId){
  const e=getEntity(entityId);if(!e)return;
  if(e.background===bgName){e.background='';chip.classList.remove('sel');}
  else{
    document.querySelectorAll('#bg-toggle-group .toggle-chip').forEach(c=>c.classList.remove('sel'));
    e.background=bgName;chip.classList.add('sel');
  }
  save();updateBgPreview(e);refreshCard(entityId);
  if(document.getElementById('panel-skills').classList.contains('active'))renderSkills();
}

function toggleFeat(chip,featName,entityId){
  const e=getEntity(entityId);if(!e)return;
  if(!e.feats)e.feats=[];
  const idx=e.feats.indexOf(featName);
  if(idx!==-1){e.feats.splice(idx,1);chip.classList.remove('sel');}
  else{e.feats.push(featName);chip.classList.add('sel');}
  // show preview of last toggled feat
  const ft=FEATS.find(f=>f.name===featName);
  const pre=document.getElementById('feat-preview');
  if(ft&&pre&&idx===-1){pre.textContent=`${ft.name}: ${ft.desc}`;pre.style.display='block';}
  save();refreshCard(entityId);
  if(document.getElementById('panel-skills').classList.contains('active'))renderSkills();
}

function closeEditModal(){document.getElementById('edit-modal').classList.add('hidden');editingId=null;}
function saveEdit(){
  const e=getEntity(editingId);if(!e)return;
  const g=n=>parseInt(document.getElementById(n)?.value)||0;
  const s=n=>document.getElementById(n)?.value||'';
  e.name=s('e-name')||e.name;
  e.ac=g('e-ac')||e.ac;e.speed=g('e-speed')||e.speed;
  e.str=g('e-str')||e.str;e.dex=g('e-dex')||e.dex;e.con=g('e-con')||e.con;
  e.int=g('e-int')||e.int;e.wis=g('e-wis')||e.wis;e.cha=g('e-cha')||e.cha;
  const newMax=g('e-maxhp');if(newMax){const diff=newMax-e.maxhp;e.maxhp=newMax;e.hp=Math.max(0,Math.min(newMax,e.hp+diff));}
  if(e.type==='hero'){
    e.level=g('e-level')||e.level;e.player=s('e-player');
    e.profBonus=g('e-prof')||e.profBonus;
    const clsSel=document.getElementById('e-cls');if(clsSel)e.cls=clsSel.value;
  } else {e.etype=s('e-etype');}
  save();closeEditModal();renderCharacters();renderEnemies();
  if(document.getElementById('panel-combat').classList.contains('active'))renderCombat();
  if(document.getElementById('panel-skills').classList.contains('active'))renderSkills();
}
document.getElementById('edit-modal').addEventListener('click',function(ev){if(ev.target===this)closeEditModal();});

// ═══════════════════════════════════════════
//  EXPORT / IMPORT
// ═══════════════════════════════════════════
function entityToText(e){
  const lines=[
    `=== ${e.name} (${e.type.toUpperCase()}) ===`,
    `Type/Class: ${e.type==='hero'?(e.cls||''):(e.etype||'')}`,
    e.type==='hero'?`Level: ${e.level}  Player: ${e.player||'—'}  Background: ${e.background||'—'}`:'',
    e.type==='hero'&&e.feats?.length?`Feats: ${e.feats.join(', ')}`:'',
    `HP: ${e.hp}/${e.maxhp}  AC: ${e.ac}  Speed: ${e.speed}`,
    `STR:${e.str} DEX:${e.dex} CON:${e.con} INT:${e.int} WIS:${e.wis} CHA:${e.cha}`,
    `Initiative: ${e.initiative}`,
  ];
  const slots=(e.spellSlots||[]).map((s,i)=>s.max>0?`${ordinal(i+1)}: ${s.used}/${s.max}`:null).filter(Boolean);
  if(slots.length)lines.push('Spell Slots: '+slots.join('  '));
  if(e.conditions?.length)lines.push('Conditions: '+e.conditions.join(', '));
  if(e.notes)lines.push('Notes: '+e.notes);
  lines.push(`__JSON__:${JSON.stringify(e)}`);
  return lines.filter(l=>l!=='').join('\n');
}

function exportEntities(entities,filename){
  const text=entities.map(entityToText).join('\n\n---\n\n');
  const blob=new Blob([text],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}

function exportSelectedChars(){
  const sel=state.characters.filter(e=>document.getElementById('sel-'+e.id)?.checked);
  if(!sel.length){alert('Check at least one character to export.');return;}
  exportEntities(sel,`characters_selected_${Date.now()}.txt`);
}
function exportAllChars(){
  if(!state.characters.length){alert('No characters to export.');return;}
  exportEntities(state.characters,`characters_all_${Date.now()}.txt`);
}
function exportSelectedEnemies(){
  const sel=state.enemies.filter(e=>document.getElementById('sel-'+e.id)?.checked);
  if(!sel.length){alert('Check at least one enemy to export.');return;}
  exportEntities(sel,`enemies_selected_${Date.now()}.txt`);
}
function exportAllEnemies(){
  if(!state.enemies.length){alert('No enemies to export.');return;}
  exportEntities(state.enemies,`enemies_all_${Date.now()}.txt`);
}

function importFiles(ev,expectedType){
  const files=Array.from(ev.target.files);if(!files.length)return;
  let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(e){
      const jsonLines=e.target.result.split('\n').filter(l=>l.startsWith('__JSON__:'));
      jsonLines.forEach(line=>{
        try{
          const obj=JSON.parse(line.replace('__JSON__:',''));
          obj.id=uid();
          if(!obj.spellSlots)obj.spellSlots=defaultSlots();
          if(!obj.conditions)obj.conditions=[];
          if(!obj.feats)obj.feats=[];
          if(typeof obj.collapsed==='undefined')obj.collapsed=false;
          if(typeof obj.isNPC==='undefined')obj.isNPC=false;
          if(obj.type==='hero'){
            if(!state.characters.find(c=>c.name===obj.name&&c.cls===obj.cls))
              state.characters.push(obj);
          } else {
            state.enemies.push(obj);
          }
        }catch(_){}
      });
      loaded++;
      if(loaded===files.length){
        save();renderCharacters();renderEnemies();
        alert(`Imported from ${files.length} file(s).`);
      }
    };
    reader.readAsText(file);
  });
  ev.target.value='';
}

// ═══════════════════════════════════════════
//  COMBAT
// ═══════════════════════════════════════════
function rollAllInitiatives(){
  [...state.characters,...state.enemies].forEach(e=>{
    const eff=effectiveStats(e);
    e.initiative=Math.floor(Math.random()*20)+1+modNum(eff.dex);
  });
  state.activeTurn=0;save();renderCombat();
}
function sortInitiative(){
  state.characters.sort((a,b)=>b.initiative-a.initiative);
  state.enemies.sort((a,b)=>b.initiative-a.initiative);
  state.activeTurn=0;save();renderCombat();
}
function nextTurn(){
  const all=[...state.characters,...state.enemies].sort((a,b)=>b.initiative-a.initiative);
  if(!all.length)return;
  state.activeTurn=(state.activeTurn+1)%all.length;
  if(state.activeTurn===0)state.round++;
  save();renderCombat();
}
function resetCombat(){state.round=1;state.activeTurn=0;save();renderCombat();}
function setInitiative(id,val){const e=getEntity(id);if(e){e.initiative=parseInt(val)||0;save();}}

function renderCombat(){
  const list=document.getElementById('initiative-list');
  list.innerHTML='';
  document.getElementById('round-display').textContent='Round '+state.round;
  const all=[...state.characters,...state.enemies].sort((a,b)=>b.initiative-a.initiative);
  all.forEach((entity,idx)=>{
    const isActive=idx===state.activeTurn;
    const eff=effectiveStats(entity);
    const pct=Math.round(Math.max(0,entity.hp/entity.maxhp)*100);
    const hpStr=`${entity.hp}/${entity.maxhp}${entity.temphp>0?' (+'+entity.temphp+')':''}`;
    const condPips=entity.conditions.map(c=>`<span class="cond-pip">${c.slice(0,3)}</span>`).join('');
    const slots=(entity.spellSlots||defaultSlots()).map((s,i)=>({...s,lvl:i+1})).filter(s=>s.max>0);
    const spellHtml=slots.length?`<div class="init-spells">${slots.map(s=>`
      <div class="init-spell-row">
        <span class="init-spell-label">${ordinal(s.lvl)}</span>
        ${Array.from({length:s.max},(_,p)=>`<span class="init-spell-pip ${p<s.used?'used':''}"
          onclick="toggleSlotCombat('${entity.id}',${s.lvl-1},${p});event.stopPropagation()"></span>`).join('')}
      </div>`).join('')}</div>`:'';
    const deathSaveHtml=entity.type==='hero'&&entity.hp<=0?`<div style="margin-top:.6rem;padding:.55rem .75rem;border:1px solid var(--gold);border-radius:6px;background:rgba(255,255,255,.92);">
        <div style="font-family:'Cinzel',serif;font-size:.68rem;color:var(--ink-light);margin-bottom:4px">Death Saving Throws</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:4px">
            ${[0,1,2].map(i=>`<button class="init-ctrl h" onclick="cycleDeathSave('${entity.id}','success',${i});event.stopPropagation()" title="Success">${i<(entity.deathSaves?.success||0)?'✅':'⬜'}</button>`).join('')}
            <span style="font-size:.72rem;color:var(--ink-mid)">Success</span>
          </div>
          <div style="display:flex;align-items:center;gap:4px">
            ${[0,1,2].map(i=>`<button class="init-ctrl d" onclick="cycleDeathSave('${entity.id}','fail',${i});event.stopPropagation()" title="Failure">${i<(entity.deathSaves?.fail||0)?'❌':'⬜'}</button>`).join('')}
            <span style="font-size:.72rem;color:var(--ink-mid)">Fail</span>
          </div>
        </div>
      </div>`:'';
    const entry=document.createElement('div');
    entry.id='combat-entry-'+entity.id;
    entry.className=`init-entry ${entity.type}${entity.type==='enemy'&&entity.isNPC?' npc':''}${isActive?' active-turn':''}`;
    entry.onclick=()=>{state.activeTurn=idx;save();renderCombat();};
    entry.innerHTML=`
      <div>
        <div class="init-num" style="color:${isActive?'var(--gold-light)':'var(--gold)'}">${entity.initiative||'?'}</div>
        <input class="init-input" type="number" value="${entity.initiative||''}" placeholder="Init"
          onclick="event.stopPropagation()" onchange="setInitiative('${entity.id}',this.value);renderCombat()">
      </div>
      <div class="init-main">
        <div class="init-name" style="${isActive?'color:var(--gold)':''}">${isActive?'▶ ':''}${entity.name}</div>
        <div class="init-sub">${entity.type==='hero'?(entity.cls||'Hero'):(entity.isNPC?'NPC':entity.etype||'Enemy')} · AC ${entity.ac}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:3px">
          <div style="width:85px;height:5px;background:var(--parchment-dark);border-radius:3px;overflow:hidden;flex-shrink:0">
            <div style="width:${pct}%;height:100%;background:${hpColor(entity.hp,entity.maxhp)}"></div>
          </div>
          <span class="init-hp-mini">${hpStr} HP</span>
        </div>
        ${condPips?`<div class="init-conds">${condPips}</div>`:''}
        ${spellHtml}
        ${deathSaveHtml}
      </div>
      <div class="init-hp-controls" onclick="event.stopPropagation()">
        <input class="init-amt" id="combat-amt-${entity.id}" type="number" min="1" value="1">
        <div class="init-dmg-heal">
          <button class="init-ctrl d" onclick="applyHPCombat('${entity.id}','damage')">DMG</button>
          <button class="init-ctrl h" onclick="applyHPCombat('${entity.id}','heal')">HEAL</button>
        </div>
      </div>`;
    list.appendChild(entry);
  });
}

// init
renderCharacters();
renderEnemies();
</script>

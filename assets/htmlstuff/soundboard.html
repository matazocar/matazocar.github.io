<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Minimal Soundboard</title>
<style>
:root {
  --bg:        #0f1115;
  --bg2:       #121621;
  --bg3:       #151a24;
  --surface:   #151821;
  --border:    #232a3a;
  --border2:   #2a3347;
  --border3:   #3a4660;
  --text:      #e6e6e6;
  --text2:     #9aabcc;
  --text3:     #556677;
  --accent:    #4aa3ff;
  --accent-bg: #0d2a4a;
  --danger:    #ff6b6b;
  --danger-bg: #2a1515;
}
[data-theme="light"] {
  --bg:        #f4f5f7;
  --bg2:       #ebedf0;
  --bg3:       #ffffff;
  --surface:   #ffffff;
  --border:    #d0d5de;
  --border2:   #b0b8cc;
  --border3:   #8899bb;
  --text:      #1a1d26;
  --text2:     #4a5568;
  --text3:     #8899bb;
  --accent:    #1a7aee;
  --accent-bg: #ddeeff;
  --danger:    #cc2222;
  --danger-bg: #fdeaea;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.2s, color 0.2s;
}

/* ── header ─────────────────────────────────────────────── */
.sb-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.sb-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 15px; font-weight: 600; color: var(--text);
}
.sb-title svg { color: var(--text2); }

.theme-btn {
  border: 1px solid var(--border2);
  background: var(--bg2);
  border-radius: 8px;
  padding: 6px 8px;
  cursor: pointer;
  color: var(--text2);
  display: flex; align-items: center;
  transition: background 0.15s, color 0.15s;
}
.theme-btn:hover { background: var(--bg3); color: var(--text); }

/* ── controls bar ────────────────────────────────────────── */
.sb-controls {
  display: flex; gap: 8px; align-items: center;
  padding: 10px 20px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}

.sb-upload-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 6px 12px; cursor: pointer;
  background: var(--bg3);
  transition: background 0.15s;
  white-space: nowrap;
}
.sb-upload-label:hover { background: var(--bg2); }
#fileInput { display: none; }

.sb-btn {
  display: flex; align-items: center; gap: 5px;
  font-size: 13px; font-family: system-ui, sans-serif;
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 6px 12px; cursor: pointer;
  background: var(--bg3);
  color: var(--text);
  transition: background 0.15s;
  white-space: nowrap;
}
.sb-btn:hover { background: var(--bg2); }
.sb-btn.danger { color: var(--danger); border-color: var(--danger); }
.sb-btn.danger:hover { background: var(--danger-bg); }

/* ── grid ────────────────────────────────────────────────── */
#soundboard {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  padding: 16px 20px;
}

/* ── card ────────────────────────────────────────────────── */
.card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  cursor: grab;
  transition: border-color 0.15s, transform 0.15s, background 0.2s;
  position: relative;
  user-select: none;
}
.card:hover   { border-color: var(--border3); transform: translateY(-1px); }
.card.playing { border-color: var(--accent) !important; box-shadow: 0 0 0 1px var(--accent); }
.card.drag-over { opacity: 0.5; }

.card-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 10px; gap: 6px;
}

.name-input {
  flex: 1; border: none; background: transparent;
  color: var(--text);
  font-weight: 600; font-size: 13px;
  font-family: system-ui, sans-serif;
  outline: none; min-width: 0; padding: 0;
}
.name-input::placeholder { color: var(--text3); }

.delete-btn {
  border: none; background: transparent; cursor: pointer;
  color: var(--text3); padding: 2px 3px;
  border-radius: 6px;
  display: flex; align-items: center;
  transition: color 0.15s, background 0.15s; flex-shrink: 0;
}
.delete-btn:hover { color: var(--danger); background: var(--danger-bg); }

/* ── volume ──────────────────────────────────────────────── */
.vol-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.vol-icon { color: var(--text3); flex-shrink: 0; display: flex; }
.vol-row input[type="range"] {
  flex: 1; accent-color: var(--accent);
  height: 4px; cursor: pointer;
}
.vol-label { font-size: 11px; color: var(--text3); min-width: 30px; text-align: right; }

/* ── icon buttons ────────────────────────────────────────── */
.icon-row { display: flex; gap: 6px; }
.icon-btn {
  flex: 1; border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--text2);
  border-radius: 8px;
  padding: 7px 4px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  font-family: system-ui, sans-serif;
}
.icon-btn:hover { background: var(--bg3); border-color: var(--border3); color: var(--text); }

.icon-btn.active-loop {
  background: var(--accent-bg) !important;
  border-color: var(--accent) !important;
  color: var(--accent) !important;
}
.icon-btn.active-loop svg { stroke: var(--accent); }

/* ── text card ───────────────────────────────────────────── */
.text-card { background: var(--bg2); }
.text-card .name-input { font-weight: 400; }

/* ── empty state ─────────────────────────────────────────── */
.empty-state {
  grid-column: 1/-1; text-align: center;
  padding: 3rem 1rem; color: var(--text3); font-size: 14px;
}
.empty-state svg { display: block; margin: 0 auto 8px; }
</style>
</head>
<body>

<!-- SVG icon sprites -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="ico-sliders" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
    <circle cx="8"  cy="6"  r="2" fill="currentColor" stroke="none"/>
    <circle cx="16" cy="12" r="2" fill="currentColor" stroke="none"/>
    <circle cx="10" cy="18" r="2" fill="currentColor" stroke="none"/>
  </symbol>
  <symbol id="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="4"/>
    <line x1="12" y1="2"  x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </symbol>
  <symbol id="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </symbol>
  <symbol id="ico-upload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
    <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
  </symbol>
  <symbol id="ico-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </symbol>
  <symbol id="ico-stop-all" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
  </symbol>
  <symbol id="ico-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </symbol>
  <symbol id="ico-volume" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
  </symbol>
  <symbol id="ico-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="5 3 19 12 5 21 5 3"/>
  </symbol>
  <symbol id="ico-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <line x1="6"  y1="4" x2="6"  y2="20"/><line x1="18" y1="4" x2="18" y2="20"/>
  </symbol>
  <symbol id="ico-loop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="17 1 21 5 17 9"/>
    <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
    <polyline points="7 23 3 19 7 15"/>
    <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
  </symbol>
  <symbol id="ico-stop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="4" width="16" height="16" rx="2"/>
  </symbol>
  <symbol id="ico-music" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
  </symbol>
</svg>

<div class="sb-header">
  <div class="sb-title">
    <svg width="18" height="18" aria-hidden="true"><use href="#ico-sliders"/></svg>
    Soundboard
  </div>
  <button class="theme-btn" id="themeToggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
    <svg width="18" height="18" aria-hidden="true" id="themeIcon"><use href="#ico-sun"/></svg>
  </button>
</div>

<div class="sb-controls">
  <label class="sb-upload-label" for="fileInput">
    <svg width="15" height="15" aria-hidden="true"><use href="#ico-upload"/></svg>
    Add audio
  </label>
  <input type="file" id="fileInput" multiple accept="audio/*">

  <button class="sb-btn" onclick="addTextBlock()">
    <svg width="15" height="15" aria-hidden="true"><use href="#ico-plus"/></svg>
    Note
  </button>

  <button class="sb-btn danger" onclick="stopAll()">
    <svg width="15" height="15" aria-hidden="true"><use href="#ico-stop-all"/></svg>
    Stop all
  </button>
</div>

<div id="soundboard">
  <div class="empty-state" id="emptyState">
    <svg width="32" height="32" color="#556677" aria-hidden="true"><use href="#ico-music"/></svg>
    Add audio files to get started
  </div>
</div>

<script>
const board = document.getElementById("soundboard");
const stopCallbacks = [];
let dragged = null;

/* ── theme toggle ──────────────────────────────────────── */
const html      = document.documentElement;
const themeBtn  = document.getElementById("themeToggle");
const themeIcon = document.getElementById("themeIcon");

themeBtn.addEventListener("click", () => {
  const isDark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", isDark ? "light" : "dark");
  themeIcon.innerHTML = isDark
    ? '<use href="#ico-moon"/>'
    : '<use href="#ico-sun"/>';
  themeBtn.setAttribute("title", isDark ? "Switch to dark mode" : "Switch to light mode");
});

/* ── helpers ───────────────────────────────────────────── */
function svg(id, size = 18) {
  return `<svg width="${size}" height="${size}" aria-hidden="true"><use href="#ico-${id}"/></svg>`;
}

function updateEmpty() {
  const hasCards = board.querySelectorAll(".card").length > 0;
  document.getElementById("emptyState").style.display = hasCards ? "none" : "block";
}

/* ── sound card ────────────────────────────────────────── */
function createSoundBlock(file) {
  const url  = URL.createObjectURL(file);
  const card = document.createElement("div");
  card.className = "card";
  card.draggable = true;

  let volume      = 1;
  let loopAudio   = null;
  let currentAudio= null;
  let isPlaying   = false;

  /* top row */
  const top    = document.createElement("div");
  top.className = "card-top";

  const name = document.createElement("input");
  name.className   = "name-input";
  name.value       = file.name.replace(/\.[^.]+$/, "");
  name.addEventListener("mousedown", e => e.stopPropagation());

  const delBtn = document.createElement("button");
  delBtn.className = "delete-btn";
  delBtn.innerHTML = svg("x", 15);
  delBtn.title     = "Remove";
  delBtn.addEventListener("click", () => {
    stopCard();
    const idx = stopCallbacks.indexOf(stopCard);
    if (idx !== -1) stopCallbacks.splice(idx, 1);
    card.remove();
    updateEmpty();
  });

  top.appendChild(name);
  top.appendChild(delBtn);

  /* volume */
  const volRow   = document.createElement("div");
  volRow.className = "vol-row";

  const volIcon  = document.createElement("span");
  volIcon.className = "vol-icon";
  volIcon.innerHTML = svg("volume", 16);

  const slider   = document.createElement("input");
  slider.type    = "range";
  slider.min     = 0; slider.max = 100; slider.value = 100; slider.step = "1";
  slider.setAttribute("aria-label", "Volume");

  const volLabel = document.createElement("span");
  volLabel.className  = "vol-label";
  volLabel.textContent= "100%";

  slider.addEventListener("input", () => {
    volume = slider.value / 100;
    volLabel.textContent = slider.value + "%";
    if (currentAudio) currentAudio.volume = volume;
    if (loopAudio)    loopAudio.volume    = volume;
  });

  volRow.appendChild(volIcon);
  volRow.appendChild(slider);
  volRow.appendChild(volLabel);

  /* play button */
  const playBtn = document.createElement("button");
  playBtn.className = "icon-btn";
  playBtn.innerHTML = svg("play");
  playBtn.setAttribute("aria-label", "Play");

  function setPlayState(playing) {
    isPlaying = playing;
    playBtn.innerHTML = playing ? svg("pause") : svg("play");
    playBtn.setAttribute("aria-label", playing ? "Pause" : "Play");
    card.classList.toggle("playing", playing);
  }

  function playNew() {
    const a  = new Audio(url);
    a.volume = volume;
    currentAudio = a;
    a.onended = () => { currentAudio = null; setPlayState(false); };
    a.play();
  }

  playBtn.onclick = () => {
    if (currentAudio && isPlaying)  { currentAudio.pause(); setPlayState(false); return; }
    if (currentAudio && !isPlaying) { currentAudio.play();  setPlayState(true);  return; }
    playNew(); setPlayState(true);
  };

  /* loop button */
  const loopBtn = document.createElement("button");
  loopBtn.className = "icon-btn";
  loopBtn.innerHTML = svg("loop");
  loopBtn.setAttribute("aria-label", "Loop");
  loopBtn.title = "Loop";

  loopBtn.onclick = () => {
    if (loopAudio) {
      loopAudio.pause(); loopAudio = null;
      loopBtn.classList.remove("active-loop");
      return;
    }
    loopAudio        = new Audio(url);
    loopAudio.loop   = true;
    loopAudio.volume = volume;
    loopAudio.play();
    loopBtn.classList.add("active-loop");
  };

  /* stop button */
  const stopBtn = document.createElement("button");
  stopBtn.className = "icon-btn";
  stopBtn.innerHTML = svg("stop");
  stopBtn.setAttribute("aria-label", "Stop");

  function stopCard() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      currentAudio = null;
    }
    if (loopAudio) {
      loopAudio.pause();
      loopAudio.currentTime = 0;
      loopAudio = null;
    }
    setPlayState(false);
    loopBtn.classList.remove("active-loop");
  }

  stopBtn.onclick = stopCard;
  stopCallbacks.push(stopCard);

  /* assemble */
  const row     = document.createElement("div");
  row.className = "icon-row";
  row.appendChild(playBtn);
  row.appendChild(loopBtn);
  row.appendChild(stopBtn);

  card.appendChild(top);
  card.appendChild(volRow);
  card.appendChild(row);
  addDrag(card);
  return card;
}

/* ── text card ─────────────────────────────────────────── */
function addTextBlock() {
  const card     = document.createElement("div");
  card.className = "card text-card";
  card.draggable = true;

  const top      = document.createElement("div");
  top.className  = "card-top";

  const input    = document.createElement("input");
  input.className   = "name-input";
  input.placeholder = "Section title / notes…";
  input.addEventListener("mousedown", e => e.stopPropagation());

  const delBtn      = document.createElement("button");
  delBtn.className  = "delete-btn";
  delBtn.innerHTML  = svg("x", 15);
  delBtn.title      = "Remove";
  delBtn.addEventListener("click", () => { card.remove(); updateEmpty(); });

  top.appendChild(input);
  top.appendChild(delBtn);
  card.appendChild(top);
  addDrag(card);
  board.appendChild(card);
  updateEmpty();
  input.focus();
}

/* ── drag ──────────────────────────────────────────────── */
function addDrag(el) {
  el.addEventListener("dragstart", () => dragged = el);
  el.addEventListener("dragover",  e => { e.preventDefault(); el.classList.add("drag-over"); });
  el.addEventListener("dragleave", ()  => el.classList.remove("drag-over"));
  el.addEventListener("drop", e => {
    e.preventDefault();
    el.classList.remove("drag-over");
    if (!dragged || dragged === el) return;
    const items = [...board.children];
    const from  = items.indexOf(dragged);
    const to    = items.indexOf(el);
    if (from < to) board.insertBefore(dragged, el.nextSibling);
    else           board.insertBefore(dragged, el);
  });
}

/* ── file input ────────────────────────────────────────── */
document.getElementById("fileInput").addEventListener("change", e => {
  [...e.target.files].forEach(f => board.appendChild(createSoundBlock(f)));
  updateEmpty();
  e.target.value = "";
});

/* ── stop all ──────────────────────────────────────────── */
function stopAll() {
  stopCallbacks.forEach(fn => fn());
}
</script>
</body>
</html>

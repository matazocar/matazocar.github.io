<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}} — Your Name</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>

  <header class="site-header">
    <div class="wrap">
      <a class="site-title" href="../index.html">
        <span class="dot">&gt;</span> Your Name
      </a>

      <nav class="site-nav">
        <a href="../index.html">Home</a>
        <a href="../publications.html">Publications</a>
        <a href="../blog.html" class="active">Blog</a>
        <a href="../cv.html">CV</a>
        <a href="../notes.html">Notes</a>
      </nav>
    </div>
  </header>

  <main class="wrap">

    <a class="back-link" href="../blog.html">&larr; Back to blog</a>

    <article class="post">

      <h1 class="post-title">{{TITLE}}</h1>

      <div class="post-meta">
        <span class="post-date">{{DATE}}</span>
        <span class="post-tags">{{TAGS}}</span>
      </div>

      <div class="post-body">
        {{CONTENT}}
      </div>

    </article>

  </main>

  <footer class="site-footer">
    <div class="wrap">
      <span>&copy; 2026 Your Name</span>
      <span>Built with HTML, CSS &amp; a little JS</span>
    </div>
  </footer>

  <script src="../assets/js/site.js"></script>
</body>
</html>

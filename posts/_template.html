<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="../assets/js/theme.js"></script>
  <title>{{TITLE}} — Matías Azócar Carvajal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script>
    MathJax = {
      tex: {
        inlineMath: [["$", "$"]],
        displayMath: [["$$", "$$"]]
      },
      svg: { fontCache: "global" }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>
<body>

  <header class="site-header">
    <div class="wrap">
      <a class="site-title" href="../index.html"><span class="dot">&gt;</span> Your Name</a>
      <nav class="site-nav">
        <a href="../index.html">Home</a>
        <a href="../publications.html">Publications</a>
        <a href="../blog.html" class="active">Blog</a>
        <a href="../cv.html">CV</a>
        <a href="../notes.html">Notes</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
          <span class="icon-moon">&#9789;</span>
          <span class="icon-sun">&#9728;</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <a class="back-link" href="../blog.html">&larr; Back to blog</a>
    <h1>{{TITLE}}</h1>
    <p class="post-meta"><span class="post-date">{{DATE}}</span>{{TAGS}}</p>
    <div class="post-body">
      {{CONTENT}}
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <span>&copy; 2026 Matías Azócar Carvajal</span>
      <span>Built with HTML, CSS &amp; a little JS</span>
    </div>
  </footer>

  <script src="../assets/js/site.js"></script>
</body>
</html>
